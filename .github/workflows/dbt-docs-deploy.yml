name: DBT Docs Generate and Deploy

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'dbt/**'
      - 'requirements.txt'
      - '.github/workflows/dbt-docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    name: Generate DBT Docs and Deploy to Pages
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR was merged
        if: github.event.pull_request.merged == false
        run: exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dbt deps
        run: |
          dbt deps

      - name: Generate dbt docs
        run: |
          dbt docs generate

      - name: Copy docs to GitHub Pages
        run: |
          mkdir -p gh-pages
          cp -r target/compiled gh-pages/
          cp target/manifest.json gh-pages/
          cp target/index.html gh-pages/ || true

      - name: Create index.html redirect
        run: |
          cat > gh-pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>DBT Documentation</title>
            </head>
            <body>
              <h1>DBT Documentation</h1>
              <p>Loading documentation...</p>
              <script>
                window.location.href = '/dbt-data-transformations/#/';
              </script>
            </body>
          </html>
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
