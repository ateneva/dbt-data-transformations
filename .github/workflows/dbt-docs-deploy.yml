name: DBT Docs Generate and Deploy

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'dbt/**'
      - 'requirements.txt'
      - '.github/workflows/dbt-docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  GCP_PROJECT_ID: data-geeking-gcp
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    name: Generate DBT Docs and Deploy to Pages
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR was merged
        if: github.event.pull_request.merged == false
        run: exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dbt deps
        run: |
          dbt deps

      - name: Generate dbt docs
        run: |
          dbt docs generate

      - name: Copy docs to GitHub Pages
        run: |
          mkdir -p gh-pages
          cp -r target/compiled gh-pages/
          cp target/manifest.json gh-pages/
          cp target/index.html gh-pages/ || true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
